<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumark</title>
    <link rel="stylesheet" href="../style/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="page header">
      <img class="logo item" src="../images/main/logo.png" alt="Alumark" />
      <a href="/src/public/pages/index.html" class="item"><em>Home</em></a>
      <a href="/src/public/pages/contato.html" class="item"
        ><em><strong>Contato</strong></em></a
      >
      <a href="/src/public/pages/perfis.html" class="item"
        ><em>Perfis Industriais</em></a
      >
      <a href="/src/public/pages/civil.html" class="item">
        <em>Construção Civil</em>
      </a>
    </header>
    <main></main>
    <footer class="page footer ctt">
      <div class="container">
        <h1 class="main-title">Contato</h1>
        <hr />
        <br />
        <div class="faq">
          <div class="addresses">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d913.4435279764092!2d-46.3028807121811!3d-23.684034782383705!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce5b615efe8f99%3A0x438be8180d3501ac!2sAlumark%20Aluminios%20e%20Acess%C3%B3rios!5e0!3m2!1spt-PT!2sbr!4v1768505359568!5m2!1spt-PT!2sbr"
              style="border: 0"
              class="mapa"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <h1 class="title">Nossas redes sociais</h1>
            <i class="bi bi-instagram item icon">
              <a class="item" href="https://instagram.com">/Alumark</a>
            </i>
            <i class="bi bi-telephone item icon">
              <a class="item" href="https://instagram.com">(11) 99999-9999</a>
            </i>
            <i class="bi bi-envelope item icon">
              <a class="item icon" href="https://instagram.com"
                >email@dominio.com</a
              >
            </i>
          </div>
          <form
            action="https://formsubmit.co/vinicios.augusto310@gmail.com"
            method="POST"
            data-form
          >
            <h1 class="title">Fale conosco</h1>
            <label for="nome">Nome: </label>
            <input
              required
              type="text"
              class="inp-form"
              name="nome"
              placeholder="Nome"
            />

            <label for="email">E-mail: </label>
            <input
              required
              type="email"
              placeholder="E-mail"
              name="email"
              class="inp-form"
            />
            <input type="hidden" name="_captcha" value="false" />
            <label for="phone">Telefone: </label>
            <input
              required
              type="text"
              placeholder="Telefone"
              name="phone"
              class="inp-form"
            />

            <label for="mensagem">Sua mensagem: </label>
            <textarea
              required
              name="mensagem"
              type="text"
              class="inp-form message"
              rows="1"
              placeholder="Envie sua mensagem"
            ></textarea>

            <button class="btn-form" id="btn-submit" type="submit" data-button>
              Enviar
            </button>
          </form>
        </div>
      </div>

      <p class="item">
        <em>
          Alumark™ Todos os direitos reservados - <span id="year"></span
        ></em>
      </p>
    </footer>
    <script src="../scripts/index.js"></script>
  </body>
</html>
